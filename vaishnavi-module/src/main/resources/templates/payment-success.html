<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Success - Transport System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5 text-center">
    <div class="alert alert-success" role="alert" th:if="${transaction.status == 'SUCCESS'}">
        <h4 class="alert-heading">Payment Successful!</h4>
        <p>Your payment of $<span th:text="${transaction.amount}"></span> has been received.</p>
        <hr>
        <p class="mb-0">Transaction ID: <span th:text="${transaction.transactionId}"></span></p>
        <p>Payment Method: <span th:text="${transaction.paymentMethod}"></span></p>
    </div>

    <div class="alert alert-danger" role="alert" th:if="${transaction.status != 'SUCCESS'}">
        <h4 class="alert-heading">Payment Failed!</h4>
        <p>There was an issue processing your payment.</p>
    </div>
    
    <a href="/bookings" class="btn btn-primary mt-3">View Bookings</a>
    <a href="/reports" class="btn btn-secondary mt-3">View Reports</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
