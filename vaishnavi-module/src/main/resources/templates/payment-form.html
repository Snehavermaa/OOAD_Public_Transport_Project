<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Process Payment - Transport System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .method-details { display: none; margin-top: 15px;}
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">
    <h2>Complete Your Payment</h2>
    <div class="card my-4">
        <div class="card-body">
            <h5 class="card-title">Booking ID: <span th:text="${bookingId}"></span></h5>
            <h6 class="card-subtitle mb-2 text-muted">Amount Due: $<span th:text="${amount}"></span></h6>

            <form th:action="@{/payment/process}" method="post">
                <input type="hidden" name="bookingId" th:value="${bookingId}" />
                <input type="hidden" name="amount" th:value="${amount}" />
                
                <div class="mb-3">
                    <label class="form-label">Select Payment Method</label>
                    <select class="form-select" name="method" id="paymentMethod" required onchange="showDetails()">
                        <option value="" disabled selected>Select a method...</option>
                        <option value="CreditCard">Credit Card</option>
                        <option value="UPI">UPI</option>
                        <option value="Wallet">Digital Wallet</option>
                    </select>
                </div>
                
                <div id="CreditCardDetails" class="method-details">
                    <div class="mb-3">
                        <label>Card Number</label>
                        <input type="text" class="form-control" name="detail_cc" placeholder="1234 5678 9101 1121" />
                    </div>
                </div>

                <div id="UPIDetails" class="method-details">
                    <div class="mb-3">
                        <label>UPI ID</label>
                        <input type="text" class="form-control" name="detail_upi" placeholder="username@bank" />
                    </div>
                </div>

                <div id="WalletDetails" class="method-details">
                    <div class="mb-3">
                        <label>Wallet Registered Mobile</label>
                        <input type="text" class="form-control" name="detail_wallet" placeholder="9876543210" />
                    </div>
                </div>
                
                <!-- We will rely on JavaScript to push the relevant detail into this hidden field -->
                <input type="hidden" name="detail" id="finalDetail" />
                
                <button type="submit" class="btn btn-primary" onclick="prepareSubmit()">Pay Now</button>
            </form>
        </div>
    </div>
</div>

<script>
    function showDetails() {
        document.querySelectorAll('.method-details').forEach(el => el.style.display = 'none');
        const method = document.getElementById('paymentMethod').value;
        if (method) {
            document.getElementById(method + 'Details').style.display = 'block';
        }
    }
    
    function prepareSubmit() {
        const method = document.getElementById('paymentMethod').value;
        let detailValue = '';
        if (method === 'CreditCard') {
            detailValue = document.querySelector('input[name="detail_cc"]').value;
        } else if (method === 'UPI') {
            detailValue = document.querySelector('input[name="detail_upi"]').value;
        } else if (method === 'Wallet') {
            detailValue = document.querySelector('input[name="detail_wallet"]').value;
        }
        document.getElementById('finalDetail').value = detailValue;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
