<!DOCTYPE html>
<html>
<head>
    <title>Fare Calculator</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f7fa;
        }

        h2 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        h3 {
            margin-top: 20px;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<h2>Fare Calculator</h2>

<form action="/calculateFare" method="post">

    Route:
    <select name="routeId">
        <option th:each="r : ${routes}"
                th:value="${r.id}"
                th:text="${r.source + ' - ' + r.destination}">
        </option>
    </select><br><br>

    AC Bus:
    <input type="checkbox" name="isAC"><br>

    Peak Time:
    <input type="checkbox" name="isPeak"><br><br>

    <button type="submit">Calculate Fare</button>
</form>

<h3 th:if="${fare != null}">
    Fare: ₹<span th:text="${fare}"></span>
</h3>

</body>
</html>
