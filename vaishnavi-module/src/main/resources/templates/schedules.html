<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Schedules</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f7; }
        .container { max-width: 900px; margin: 24px auto; padding: 16px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #007acc; color: white; }
        a.button { display: inline-block; padding: 8px 16px; background: #007acc; color: white; text-decoration: none; border-radius: 4px; }
        a.button:hover { background: #005fa3; }
    </style>
</head>
<body>
<div th:replace="fragments/nav :: nav"></div>
<div class="container">
    <h2>All Schedules</h2>
    <table>
        <tr>
            <th>Bus ID</th>
            <th>Date</th>
            <th>Time</th>
            <th>Route</th>
        </tr>
        <tr th:each="s : ${schedules}">
            <td th:text="${s.busId}"></td>
            <td th:text="${s.travelDate}"></td>
            <td th:text="${s.departureTime}"></td>
            <td th:text="${s.route.source + ' - ' + s.route.destination}"></td>
        </tr>
    </table>
    <a class="button" href="/schedules/add">Add Schedule</a>
</div>
</body>
</html> | <a href="/search-routes">Search Routes</a> | <a href="/bookings">View Bookings</a>
