<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>System Reports - Transport System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">
    <h2 class="mb-4">System Reports Dashboard</h2>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card text-white bg-success mb-3">
                <div class="card-header">Total Revenue</div>
                <div class="card-body">
                    <h3 class="card-title">$<span th:text="${totalRevenue}"></span></h3>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Revenue by Payment Method</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center" th:each="entry : ${revenueBreakdown}">
                        <span th:text="${entry.key}"></span>
                        <span class="badge bg-primary rounded-pill">$<span th:text="${entry.value}"></span></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <h4>Transaction History</h4>
    <div class="table-responsive mb-5">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>TXN ID</th>
                    <th>Booking ID</th>
                    <th>User ID</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Status</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="txn : ${transactions}">
                    <td th:text="${txn.transactionId}"></td>
                    <td th:text="${txn.bookingId}"></td>
                    <td th:text="${txn.userId}"></td>
                    <td th:text="${txn.amount}"></td>
                    <td th:text="${txn.paymentMethod}"></td>
                    <td th:text="${txn.status}"></td>
                    <td th:text="${#calendars.format(txn.timestamp, 'yyyy-MM-dd HH:mm:ss')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <h4>Booking History Overview</h4>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Booking ID</th>
                    <th>Passenger Name</th>
                    <th>Ref No.</th>
                    <th>Seats</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${bookings}">
                    <td th:text="${b.id}"></td>
                    <td th:text="${b.passengerName}"></td>
                    <td th:text="${b.bookingReference}"></td>
                    <td th:text="${b.seats}"></td>
                    <td th:text="${b.status}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
