<h2>All Stops</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Arrival</th>
        <th>Departure</th>
    </tr>

    <tr th:each="s : ${stops}">
        <td th:text="${s.stopName}"></td>
        <td th:text="${s.arrivalTime}"></td>
        <td th:text="${s.departureTime}"></td>
    </tr>
</table>

<a href="/stops/add">Add Stop</a>
