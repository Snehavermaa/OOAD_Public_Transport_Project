<!DOCTYPE html>
<html>
<head>
    <title>Add Route</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fdfdfd; margin: 0; }
        .container { width: 50%; margin: auto; padding: 20px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-top: 50px; border-radius: 8px;}
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .btn { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .back { background: #7f8c8d; text-decoration: none; display: inline-block; padding: 10px 20px; color: white; border-radius: 5px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Add System Route</h2>
        <form action="/admin/add-route" method="POST">
            <label>Source City/Stop:</label>
            <input type="text" name="source" required>
            
            <label>Destination City/Stop:</label>
            <input type="text" name="destination" required>
            
            <label>Distance (km):</label>
            <input type="number" step="0.1" name="distance" required>
            
            <button type="submit" class="btn">Save Route</button>
            <a href="/admin/home" class="back">Back</a>
        </form>
    </div>
</body>
</html>
