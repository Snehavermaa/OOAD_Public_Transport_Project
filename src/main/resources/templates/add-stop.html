<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Stop — TransitHub</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy:#050d1a;
            --navy-card:#0d2038;
            --teal:#00d4aa;
            --teal-dim:#00a888;
            --white:#f0f4f8;
            --muted:#6b7f96;
            --border:rgba(0,212,170,0.12);
        }

        body {
            font-family:'DM Sans',sans-serif;
            background:var(--navy);
            color:var(--white);
        }

        .page {
            max-width:600px;
            margin:60px auto;
            padding:20px;
        }

        .card {
            background:var(--navy-card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            font-family:'Syne',sans-serif;
            margin-bottom:20px;
        }

        form {
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        label {
            font-size:13px;
            color:var(--muted);
        }

        input {
            padding:12px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.08);
            background:rgba(255,255,255,0.03);
            color:var(--white);
        }

        input:focus {
            outline:none;
            border-color:var(--teal);
        }

        .btn {
            margin-top:10px;
            padding:12px;
            background:var(--teal);
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        .btn:hover {
            background:var(--teal-dim);
            transform:translateY(-1px);
        }
    </style>
</head>

<body>

<div th:replace="fragments/nav :: nav"></div>

<div class="page">
    <div class="card">

        <h2>📍 Add New Stop</h2>

        <form action="/stops/save" method="post">

            <div>
                <label>Stop Name</label>
                <input type="text" name="stopName" required>
            </div>

            <div>
                <label>Arrival Time</label>
                <input type="text" name="arrivalTime" placeholder="HH:MM" required>
            </div>

            <div>
                <label>Departure Time</label>
                <input type="text" name="departureTime" placeholder="HH:MM" required>
            </div>

            <button class="btn">Save Stop</button>

        </form>

    </div>
</div>

</body>
</html>
