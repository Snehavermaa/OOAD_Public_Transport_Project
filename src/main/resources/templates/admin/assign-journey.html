<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Journey — TransitHub Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#050d1a;--navy-mid:#0a1929;--navy-card:#0d2038;--teal:#00d4aa;--teal-dim:#00a888;--amber:#f5a623;--white:#f0f4f8;--muted:#6b7f96;--border:rgba(0,212,170,0.12);--border-light:rgba(255,255,255,0.06);--input-bg:rgba(255,255,255,0.04);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}

        .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(5,13,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
        .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--white);display:flex;align-items:center;gap:10px;text-decoration:none;}
        .logo-dot{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
        .badge-admin{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);background:var(--amber);padding:3px 10px;border-radius:100px;}
        .btn-sm{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;color:var(--white);border:1px solid var(--border-light);background:rgba(255,255,255,0.04);transition:all .2s;}
        .btn-sm:hover{border-color:var(--teal);color:var(--teal);}

        .page{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:48px 40px;}
        .back-link{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color .2s;}
        .back-link:hover{color:var(--teal);}
        .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;}
        h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px;}
        .subtitle{font-size:14px;color:var(--muted);margin-bottom:36px;}

        .form-card{background:var(--navy-card);border:1px solid var(--border);border-radius:16px;padding:32px;}
        .section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:16px;margin-top:28px;display:flex;align-items:center;gap:10px;}
        .section-label:first-child{margin-top:0;}
        .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .form-row.full{grid-template-columns:1fr;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
        .form-group input, .form-group select{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--border-light);border-radius:10px;font-size:14px;color:var(--white);font-family:'DM Sans',sans-serif;transition:all .2s;appearance:none;}
        .form-group input::placeholder{color:rgba(107,127,150,0.6);}
        .form-group input:focus, .form-group select:focus{outline:none;border-color:var(--teal);background:rgba(0,212,170,0.04);box-shadow:0 0 0 3px rgba(0,212,170,0.08);}
        .form-group select option{background:var(--navy-mid);color:var(--white);}
        .input-hint{font-size:11px;color:var(--muted);margin-top:5px;}

        .submit-btn{width:100%;padding:15px;background:var(--teal);color:var(--navy);border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:24px;letter-spacing:.02em;box-shadow:0 0 30px rgba(0,212,170,0.2);}
        .submit-btn:hover{background:var(--teal-dim);transform:translateY(-2px);}
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="logo"><div class="logo-dot"></div> TransitHub</a>
    <div style="display:flex;align-items:center;gap:14px;">
        <span class="badge-admin">Admin</span>
        <a href="/auth/logout" class="btn-sm">Sign out</a>
    </div>
</header>

<div class="page">
    <a href="/admin/home" class="back-link">← Back to Dashboard</a>
    <div class="eyebrow">Journey Management</div>
    <h1>Assign Journey</h1>
    <p class="subtitle">Link a bus and driver to a route with full schedule details.</p>

    <div class="form-card">
        <form method="post" action="/admin/assign-journey">

            <div class="section-label">Bus &amp; Driver</div>

            <div class="form-row">
                <div class="form-group">
                    <label for="busId">Select Bus</label>
                    <select id="busId" name="busId" required>
                        <option value="">— Choose a bus —</option>
                        <option th:each="bus : ${buses}"
                                th:value="${bus.id}"
                                th:text="${bus.number + ' (cap: ' + bus.capacity + ')'}">
                        </option>
                    </select>
                    <div class="input-hint">Bus number and seat capacity</div>
                </div>
                <div class="form-group">
                    <label for="driverId">Select Driver</label>
                    <select id="driverId" name="driverId" required>
                        <option value="">— Choose a driver —</option>
                        <option th:each="d : ${drivers}"
                                th:value="${d.id}"
                                th:text="${d.name + ' · ' + d.licenseNumber}">
                        </option>
                    </select>
                    <div class="input-hint">Driver name and license</div>
                </div>
            </div>

            <div class="section-label">Route</div>

            <div class="form-row full">
                <div class="form-group">
                    <label for="routeId">Select Route</label>
                    <select id="routeId" name="routeId" required>
                        <option value="">— Choose a route —</option>
                        <option th:each="r : ${routes}"
                                th:value="${r.id}"
                                th:text="${r.source + ' → ' + r.destination + ' (' + r.distance + ' km)'}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="section-label">Schedule</div>

            <div class="form-row full">
                <div class="form-group">
                    <label for="travelDate">Travel Date</label>
                    <input type="date" id="travelDate" name="travelDate" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="departureTime">Departure Time</label>
                    <input type="time" id="departureTime" name="departureTime" required>
                </div>
                <div class="form-group">
                    <label for="arrivalTime">Arrival Time</label>
                    <input type="time" id="arrivalTime" name="arrivalTime" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Assign Journey →</button>
        </form>
    </div>
</div>

</body>
</html>
