<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings — TransitHub Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#050d1a;--navy-mid:#0a1929;--navy-card:#0d2038;--teal:#00d4aa;--amber:#f5a623;--red:#ff6b6b;--white:#f0f4f8;--muted:#6b7f96;--border:rgba(0,212,170,0.12);--border-light:rgba(255,255,255,0.06);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}

        .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(5,13,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
        .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--white);display:flex;align-items:center;gap:10px;text-decoration:none;}
        .logo-dot{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
        .badge-admin{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);background:var(--amber);padding:3px 10px;border-radius:100px;}
        .btn-sm{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;color:var(--white);border:1px solid var(--border-light);background:rgba(255,255,255,0.04);transition:all .2s;}
        .btn-sm:hover{border-color:rgba(255,80,80,.4);color:#ff6b6b;}

        .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:40px;}
        .back-link{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color .2s;}
        .back-link:hover{color:var(--teal);}
        .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;}
        h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:32px;}

        .table-card{background:var(--navy-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
        .table-card-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
        .table-card-head h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
        .table-count{font-size:12px;color:var(--muted);background:rgba(0,212,170,.08);border:1px solid var(--border);padding:2px 10px;border-radius:100px;}

        table{width:100%;border-collapse:collapse;}
        thead th{padding:12px 20px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;background:rgba(0,0,0,.15);border-bottom:1px solid var(--border);}
        tbody td{padding:14px 20px;font-size:14px;color:var(--white);border-bottom:1px solid rgba(255,255,255,.03);}
        tbody tr:last-child td{border-bottom:none;}
        tbody tr:hover td{background:rgba(0,212,170,.03);}
        .td-muted{color:var(--muted);}
        .pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600;}
        .pill-teal{background:rgba(0,212,170,.08);color:var(--teal);border:1px solid var(--border);}
        .pill-amber{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.25);}
        .pill-red{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.25);}
        .table-empty{padding:48px;text-align:center;color:var(--muted);font-size:14px;}
    </style>
</head>
<body>

<header class="topbar">
    <a href="/" class="logo"><div class="logo-dot"></div> TransitHub</a>
    <div style="display:flex;align-items:center;gap:14px;">
        <span class="badge-admin">Admin</span>
        <a href="/auth/logout" class="btn-sm">Sign out</a>
    </div>
</header>

<div class="page">
    <a href="/admin/home" class="back-link">← Back to Dashboard</a>
    <div class="eyebrow">Passenger Activity</div>
    <h1>All Bookings</h1>

    <div class="table-card">
        <div class="table-card-head">
            <h3>Bookings</h3>
            <span class="table-count" th:text="${#lists.size(bookings)} + ' total'">0 total</span>
        </div>

        <div th:if="${#lists.isEmpty(bookings)}" class="table-empty">
            🎟️ No bookings made yet by passengers.
        </div>

        <table th:if="${!#lists.isEmpty(bookings)}">
            <thead>
                <tr>
                    <th>Ref #</th>
                    <th>Passenger</th>
                    <th>Seats</th>
                    <th>Route</th>
                    <th>Date</th>
                    <th>Departure</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${bookings}">
                    <td class="td-muted" th:text="${b.bookingReference}"></td>
                    <td th:text="${b.passengerName}"></td>
                    <td th:text="${b.seats}"></td>
                    <td>
                        <span class="pill pill-teal"
                            th:text="${b.schedule != null and b.schedule.route != null
                                ? b.schedule.route.source + ' → ' + b.schedule.route.destination
                                : '—'}">
                        </span>
                    </td>
                    <td class="td-muted"
                        th:text="${b.schedule != null ? b.schedule.travelDate : '—'}">
                    </td>
                    <td class="td-muted"
                        th:text="${b.schedule != null ? b.schedule.departureTime : '—'}">
                    </td>
                    <td>
                        <span th:class="${b.status == 'CONFIRMED'
                                         ? 'pill pill-teal'
                                         : (b.status == 'CANCELLED'
                                            ? 'pill pill-red'
                                            : 'pill pill-amber')}"
                              th:text="${b.status}">
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
