<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Ticket — TransitHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #050d1a;
            --navy-mid: #0a1929;
            --navy-card: #0d2038;
            --teal: #00d4aa;
            --teal-dim: #00a888;
            --white: #f0f4f8;
            --muted: #6b7f96;
            --border: rgba(0,212,170,0.12);
            --border-light: rgba(255,255,255,0.06);
            --input-bg: rgba(255,255,255,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; z-index: 0;
        }
        /* Glowing orb */
        body::after {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
            top: -100px; right: -100px;
            pointer-events: none; z-index: 0;
        }

        .topbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 40px;
            background: rgba(5,13,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 18px; color: var(--white);
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .logo-dot {
            width: 8px; height: 8px; background: var(--teal);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }
        .back-link {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--muted);
            text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: var(--white); }

        .page {
            position: relative; z-index: 1; flex: 1;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 48px 24px;
        }

        .booking-layout {
            width: 100%; max-width: 680px;
            display: flex; flex-direction: column; gap: 20px;
            animation: fadeSlideUp 0.5s ease both;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-eyebrow {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--teal); margin-bottom: 6px;
        }
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        /* Journey details card */
        .journey-card {
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
        }
        .journey-card-head {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,212,170,0.04);
            display: flex; align-items: center; gap: 10px;
        }
        .journey-card-head h3 {
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--teal);
        }
        .journey-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        .journey-item {
            padding: 20px 24px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .journey-item:nth-child(even) { border-right: none; }
        .journey-item:nth-last-child(-n+2) { border-bottom: none; }
        .ji-label {
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 6px;
        }
        .ji-value { font-size: 15px; font-weight: 500; color: var(--white); }
        .ji-value.route {
            font-family: 'Syne', sans-serif;
            font-size: 16px; font-weight: 700;
            color: var(--teal);
        }

        /* Route visual inside card */
        .route-stops {
            display: flex; align-items: center; gap: 12px;
        }
        .route-stop { font-weight: 600; }
        .route-arrow {
            flex: 1; display: flex; align-items: center; gap: 4px;
        }
        .route-line { flex: 1; height: 2px; background: var(--border); }
        .route-arrow-icon { color: var(--teal); font-size: 12px; }

        /* Booking form card */
        .form-card {
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
        }
        .form-card-head {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
        }
        .form-card-head h3 {
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--muted);
        }
        .form-body { padding: 28px 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group:last-of-type { margin-bottom: 0; }
        .form-group label {
            display: block;
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.06em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 14px; pointer-events: none; opacity: 0.45;
        }
        .form-group input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 14px; color: var(--white);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .form-group input::placeholder { color: rgba(107,127,150,0.6); }
        .form-group input:focus {
            outline: none;
            border-color: var(--teal);
            background: rgba(0,212,170,0.04);
            box-shadow: 0 0 0 3px rgba(0,212,170,0.08);
        }
        .input-hint { font-size: 11px; color: var(--muted); margin-top: 5px; padding-left: 4px; }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 14px;
            margin: 24px 0;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border-light); }
        .divider-text { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

        .submit-btn {
            width: 100%; padding: 15px;
            background: var(--teal); color: var(--navy);
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: all 0.2s;
            letter-spacing: 0.02em;
            box-shadow: 0 0 30px rgba(0,212,170,0.2);
            margin-top: 24px;
        }
        .submit-btn:hover {
            background: var(--teal-dim);
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0,212,170,0.4);
        }
        .submit-btn:active { transform: translateY(0); }

        @media (max-width: 500px) {
            .journey-details { grid-template-columns: 1fr; }
            .journey-item { border-right: none; }
            .journey-item:nth-last-child(-n+2) { border-bottom: 1px solid var(--border); }
            .journey-item:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            TransitHub
        </a>
        <a href="/search-routes" class="back-link">← Back to Search</a>
    </header>

    <div th:replace="fragments/nav :: nav"></div>

    <div class="page">
        <div class="booking-layout">
            <div>
                <div class="page-eyebrow">Booking</div>
                <div class="page-title">Confirm your ticket</div>
            </div>

            <!-- Journey summary -->
            <div class="journey-card">
                <div class="journey-card-head">
                    <h3>🗺️ &nbsp;Journey Details</h3>
                </div>
                <div class="journey-details">
                    <div class="journey-item">
                        <div class="ji-label">Route</div>
                        <div class="ji-value route">
                            <div class="route-stops">
                                <span class="route-stop" th:text="${schedule.route.source}">Source</span>
                                <div class="route-arrow">
                                    <div class="route-line"></div>
                                    <span class="route-arrow-icon">→</span>
                                </div>
                                <span class="route-stop" th:text="${schedule.route.destination}">Destination</span>
                            </div>
                        </div>
                    </div>
                    <div class="journey-item">
                        <div class="ji-label">Bus ID</div>
                        <div class="ji-value" th:text="${schedule.busId}">BUS-001</div>
                    </div>
                    <div class="journey-item">
                        <div class="ji-label">Travel Date</div>
                        <div class="ji-value" th:text="${schedule.travelDate}">2024-01-01</div>
                    </div>
                    <div class="journey-item">
                        <div class="ji-label">Departure Time</div>
                        <div class="ji-value" th:text="${schedule.departureTime}">08:00 AM</div>
                    </div>
                </div>
            </div>

            <!-- Booking form -->
            <div class="form-card">
                <div class="form-card-head">
                    <h3>Passenger Details</h3>
                </div>
                <div class="form-body">
                    <form action="/bookings/create" method="post">
                        <input type="hidden" name="scheduleId" th:value="${schedule.id}" />

                        <div class="form-group">
                            <label for="passengerName">Passenger Name</label>
                            <div class="input-wrap">
                                <span class="input-icon">👤</span>
                                <input type="text" id="passengerName" name="passengerName"
                                       th:value="${booking.passengerName}"
                                       placeholder="Full name as on ID"
                                       required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="seats">Number of Seats</label>
                            <div class="input-wrap">
                                <span class="input-icon">🎟️</span>
                                <input type="number" id="seats" name="seats"
                                       th:value="${booking.seats}"
                                       placeholder="1" min="1" required>
                            </div>
                            <div class="input-hint">Maximum 10 seats per booking</div>
                        </div>

                        <div class="divider">
                            <div class="divider-line"></div>
                            <div class="divider-text">Payment on board</div>
                            <div class="divider-line"></div>
                        </div>

                        <button type="submit" class="submit-btn">Confirm Booking →</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
