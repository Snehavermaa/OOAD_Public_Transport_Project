<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status — TransitHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #050d1a;
            --navy-card: #0d2038;
            --teal: #00d4aa;
            --teal-dim: #00a888;
            --red: #ff4f4f;
            --red-dim: rgba(255,79,79,0.08);
            --white: #f0f4f8;
            --muted: #6b7f96;
            --border: rgba(0,212,170,0.12);
            --border-light: rgba(255,255,255,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; z-index: 0;
        }

        .topbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 40px;
            background: rgba(5,13,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 18px; color: var(--white);
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .logo-dot {
            width: 8px; height: 8px; background: var(--teal);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }

        .page {
            position: relative; z-index: 1; flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 48px 24px;
        }

        .result-card {
            width: 100%; max-width: 480px;
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Success state */
        .result-hero {
            padding: 44px 36px 32px;
            text-align: center;
            position: relative; overflow: hidden;
        }
        .result-hero.success { background: linear-gradient(160deg, rgba(0,212,170,0.1) 0%, transparent 60%); }
        .result-hero.failed  { background: linear-gradient(160deg, rgba(255,79,79,0.08) 0%, transparent 60%); }

        .result-icon {
            font-size: 56px;
            display: block; margin-bottom: 20px;
            animation: bounceIn 0.6s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .result-title {
            font-family: 'Syne', sans-serif;
            font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .result-title.success { color: var(--teal); }
        .result-title.failed  { color: var(--red); }

        .result-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }

        /* Transaction details */
        .tx-details {
            padding: 0 24px 8px;
            border-top: 1px solid var(--border);
        }
        .tx-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .tx-row:last-child { border-bottom: none; }
        .tx-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .tx-value { font-size: 14px; font-weight: 600; color: var(--white); }
        .tx-value.amount {
            font-family: 'Syne', sans-serif;
            font-size: 18px; font-weight: 800; color: var(--teal);
        }
        .tx-id { font-family: monospace; font-size: 13px; color: var(--teal); letter-spacing: 0.05em; }

        /* Action buttons */
        .card-actions {
            padding: 20px 24px 28px;
            display: flex; gap: 10px;
        }
        .btn {
            flex: 1; padding: 13px;
            border-radius: 10px;
            font-size: 14px; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            text-decoration: none; text-align: center;
            transition: all 0.2s; cursor: pointer; border: none;
        }
        .btn-primary {
            background: var(--teal); color: var(--navy);
            box-shadow: 0 0 20px rgba(0,212,170,0.2);
        }
        .btn-primary:hover { background: var(--teal-dim); transform: translateY(-2px); }
        .btn-secondary {
            background: transparent; color: var(--white);
            border: 1px solid var(--border-light);
        }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
        .btn-retry {
            background: var(--red); color: white;
            box-shadow: 0 0 20px rgba(255,79,79,0.2);
        }
        .btn-retry:hover { background: #e03e3e; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            TransitHub
        </a>
    </header>

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="page">

        <!-- SUCCESS -->
        <div class="result-card" th:if="${transaction.status == 'SUCCESS'}">
            <div class="result-hero success">
                <span class="result-icon">✅</span>
                <div class="result-title success">Payment Successful</div>
                <div class="result-desc">Your booking is confirmed. Have a great journey!</div>
            </div>
            <div class="tx-details">
                <div class="tx-row">
                    <span class="tx-label">Amount Paid</span>
                    <span class="tx-value amount">$<span th:text="${transaction.amount}">0.00</span></span>
                </div>
                <div class="tx-row">
                    <span class="tx-label">Transaction ID</span>
                    <span class="tx-id" th:text="${transaction.transactionId}">TXN-XXXXXXX</span>
                </div>
                <div class="tx-row">
                    <span class="tx-label">Payment Method</span>
                    <span class="tx-value" th:text="${transaction.paymentMethod}">UPI</span>
                </div>
            </div>
            <div class="card-actions">
                <a href="/bookings" class="btn btn-primary">View Bookings</a>
                <a href="/reports" class="btn btn-secondary">Reports</a>
            </div>
        </div>

        <!-- FAILED -->
        <div class="result-card" th:if="${transaction.status != 'SUCCESS'}">
            <div class="result-hero failed">
                <span class="result-icon">❌</span>
                <div class="result-title failed">Payment Failed</div>
                <div class="result-desc">Something went wrong processing your payment. Please try again.</div>
            </div>
            <div class="card-actions">
                <a href="/bookings" class="btn btn-retry">Try Again</a>
                <a href="/bookings" class="btn btn-secondary">My Bookings</a>
            </div>
        </div>

    </div>
</body>
</html>
