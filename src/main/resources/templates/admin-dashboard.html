<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — TransitHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #050d1a;
            --navy-mid: #0a1929;
            --navy-card: #0d2038;
            --teal: #00d4aa;
            --teal-dim: #00a888;
            --amber: #f5a623;
            --white: #f0f4f8;
            --muted: #6b7f96;
            --border: rgba(0,212,170,0.12);
            --border-light: rgba(255,255,255,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Topbar */
        .topbar {
            position: sticky; top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            background: rgba(5,13,26,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: var(--teal);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .badge {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--navy);
            background: var(--amber);
            padding: 3px 10px;
            border-radius: 100px;
        }
        .welcome-text { font-size: 14px; color: var(--muted); }
        .logout-btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            color: var(--white);
            border: 1px solid var(--border-light);
            background: rgba(255,255,255,0.04);
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .logout-btn:hover { border-color: rgba(255,80,80,0.4); color: #ff6b6b; }

        /* Layout */
        .page { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 40px 40px; }

        /* Page header */
        .page-header { margin-bottom: 36px; }
        .page-header .eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 8px;
        }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Stat cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(0,212,170,0.1) 0%, transparent 70%);
        }
        .stat-icon { font-size: 22px; margin-bottom: 16px; }
        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--teal);
            line-height: 1;
        }
        .stat-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em; }

        /* Section */
        .section { margin-bottom: 28px; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-head h2 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Action buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 22px 16px;
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            text-align: center;
        }
        .action-btn:hover {
            border-color: var(--teal);
            background: rgba(0,212,170,0.06);
            transform: translateY(-3px);
        }
        .action-btn .ab-icon { font-size: 24px; }
        .action-btn.primary {
            background: var(--teal);
            color: var(--navy);
            border-color: var(--teal);
        }
        .action-btn.primary:hover { background: var(--teal-dim); border-color: var(--teal-dim); }

        /* Table */
        .table-wrap {
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            background: rgba(0,0,0,0.2);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        tbody td {
            padding: 14px 20px;
            font-size: 14px;
            color: var(--white);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(0,212,170,0.03); }
        .td-muted { color: var(--muted); }
        .td-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0,212,170,0.1);
            color: var(--teal);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            TransitHub
        </a>
        <div class="topbar-right">
            <span class="badge">Admin</span>
            <span class="welcome-text" th:text="'Welcome, ' + ${#session.userName}">Welcome, Admin</span>
            <a href="/auth/logout" class="logout-btn">Sign out</a>
        </div>
    </header>

    <div class="page">
        <div class="page-header">
            <div class="eyebrow">Administration</div>
            <h1>Dashboard</h1>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-num" th:text="${totalUsers}">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🛡️</div>
                <div class="stat-num" th:text="${adminCount}">0</div>
                <div class="stat-label">Administrators</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👤</div>
                <div class="stat-num" th:text="${userCount}">0</div>
                <div class="stat-label">Regular Users</div>
            </div>
        </div>

        <div class="section">
            <div class="section-head"><h2>User Management</h2></div>
            <div class="action-grid">
                <a href="/admin/users" class="action-btn">
                    <span class="ab-icon">👥</span>All Users
                </a>
                <a href="/admin/users/admins" class="action-btn">
                    <span class="ab-icon">🛡️</span>Administrators
                </a>
                <a href="/admin/users/regular" class="action-btn">
                    <span class="ab-icon">👤</span>Regular Users
                </a>
                <a href="/admin/users/create-admin" class="action-btn primary">
                    <span class="ab-icon">➕</span>New Admin
                </a>
            </div>
        </div>

        <div class="section">
            <div class="section-head"><h2>System Management</h2></div>
            <div class="action-grid">
                <a href="/routes" class="action-btn">
                    <span class="ab-icon">🛣️</span>Manage Routes
                </a>
                <a href="/add-route" class="action-btn primary">
                    <span class="ab-icon">➕</span>Add Route
                </a>
                <a href="/schedules" class="action-btn">
                    <span class="ab-icon">⏰</span>Schedules
                </a>
                <a href="/stops" class="action-btn">
                    <span class="ab-icon">🛑</span>Stops
                </a>
            </div>
        </div>
    </div>
</body>
</html>
