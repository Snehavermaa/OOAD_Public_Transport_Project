<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Add Route</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #eef2f7;
        }

        .container {
            max-width: 640px;
            margin: 30px auto;
            padding: 24px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            color: #0d3b66;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccd6e0;
            border-radius: 6px;
        }

        button {
            padding: 12px 20px;
            background: #0d3b66;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0a3154;
        }

        .back {
            margin-top: 10px;
            display: inline-block;
            text-decoration: none;
            color: #0d3b66;
        }
    </style>
</head>
<body>

<div th:replace="fragments/nav :: nav"></div>

<div class="container">
    <h2>Add Route</h2>

    <form th:action="@{/routes/save}" method="post">
        <label>Source</label>
        <input type="text" name="source" required />

        <label>Destination</label>
        <input type="text" name="destination" required />

        <label>Distance (km)</label>
        <input type="number" step="0.1" name="distance" required />

        <button type="submit">Save Route</button>
    </form>

    <a class="back" th:href="@{/routes}">← Back to Routes</a>
</div>

</body>
</html>
