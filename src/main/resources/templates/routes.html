<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes — TransitHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #050d1a;
            --navy-card: #0d2038;
            --teal: #00d4aa;
            --teal-dim: #00a888;
            --white: #f0f4f8;
            --muted: #6b7f96;
            --border: rgba(0,212,170,0.12);
            --border-light: rgba(255,255,255,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; z-index: 0;
        }

        .topbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 40px;
            background: rgba(5,13,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 18px; color: var(--white);
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .logo-dot {
            width: 8px; height: 8px; background: var(--teal);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }
        .topbar-links { display: flex; gap: 6px; }
        .topbar-links a {
            font-size: 13px; color: var(--muted);
            text-decoration: none; padding: 7px 16px;
            border-radius: 8px; border: 1px solid transparent;
            transition: all 0.2s; font-weight: 500;
        }
        .topbar-links a:hover { color: var(--white); border-color: var(--border); background: rgba(255,255,255,0.04); }
        .topbar-links a.active { color: var(--white); border-color: var(--border); background: rgba(255,255,255,0.04); }

        .page {
            position: relative; z-index: 1;
            max-width: 1000px; margin: 0 auto; padding: 40px;
        }

        .page-header {
            display: flex; align-items: flex-end; justify-content: space-between;
            margin-bottom: 28px;
        }
        .page-header-left .eyebrow {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--teal); margin-bottom: 6px;
        }
        .page-header-left h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
        }
        .add-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 22px;
            background: var(--teal); color: var(--navy);
            border-radius: 10px; text-decoration: none;
            font-size: 13px; font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(0,212,170,0.2);
        }
        .add-btn:hover { background: var(--teal-dim); transform: translateY(-2px); }

        /* Quick nav */
        .quick-nav {
            display: flex; gap: 10px; margin-bottom: 24px;
        }
        .qn-link {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            text-decoration: none; color: var(--muted);
            font-size: 13px; font-weight: 500;
            transition: all 0.2s;
        }
        .qn-link:hover { border-color: var(--border); color: var(--white); }

        /* Table */
        .table-card {
            background: var(--navy-card);
            border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
            animation: fadeSlideUp 0.4s ease both;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .table-card-head {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: space-between;
        }
        .table-card-head h3 {
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
        }
        .table-count {
            font-size: 12px; color: var(--muted);
            background: rgba(0,212,170,0.08);
            border: 1px solid var(--border);
            padding: 2px 10px; border-radius: 100px;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 12px 20px;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--muted); text-align: left;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--border);
        }
        tbody td {
            padding: 16px 20px; font-size: 14px;
            color: var(--white);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(0,212,170,0.03); }

        .route-cell { display: flex; align-items: center; gap: 10px; }
        .route-src { font-weight: 600; }
        .route-arrow { color: var(--teal); font-size: 13px; }
        .route-dst { color: var(--muted); font-weight: 500; }

        .dist-pill {
            display: inline-block; padding: 3px 10px;
            border-radius: 100px; font-size: 12px; font-weight: 600;
            background: rgba(0,212,170,0.08); color: var(--teal);
            border: 1px solid var(--border);
        }
        .table-empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
    </style>
</head>
<body>


    <div th:replace="fragments/nav :: nav"></div>

    <div class="page">
        <div class="page-header">
            <div class="page-header-left">
                <div class="eyebrow">Network</div>
                <h1>All Routes</h1>
            </div>
            <a href="/routes/add" class="add-btn">＋ Add Route</a>
        </div>

        <div class="quick-nav">
            <a href="/routes/search-routes" class="qn-link">🔍 Search Routes</a>
            <a href="/bookings" class="qn-link">📋 View Bookings</a>
            <a href="/schedules" class="qn-link">⏰ Schedules</a>
        </div>

        <div class="table-card">
            <div class="table-card-head">
                <h3>🛣️ &nbsp;Route Directory</h3>
                <span class="table-count" th:text="${#lists.size(routes)} + ' routes'">0 routes</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Route</th>
                        <th>Distance</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="route : ${routes}">
                        <td>
                            <div class="route-cell">
                                <span class="route-src" th:text="${route.source}">Source</span>
                                <span class="route-arrow">→</span>
                                <span class="route-dst" th:text="${route.destination}">Destination</span>
                            </div>
                        </td>
                        <td><span class="dist-pill" th:text="${route.distance} + ' km'">0 km</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(routes)}">
                        <td colspan="2" class="table-empty">No routes yet. Add your first route to get started.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
